# @Title: Elástico
# @Icon: arrows-diagonal
# @Color: #6366f1
# @Tag: FLEX
# @Desc: Física de banda elástica. Las ventanas llegan, se estiran y rebotan verticalmente.


# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Se ha inyectado física real de rebote
# (Overshoot del 15%) para justificar el nombre "Elástico".
# -----------------------------------------------------

animations {
    enabled = yes

    # --- BEZIERS ELÁSTICOS ---

    # "Rubber" (La Goma):
    # Sube muy rápido y se pasa bastante (1.15) para crear vibración visual.
    bezier = rubber, 0.05, 0.9, 0.1, 1.15

    # "Snap" (El Chasquido):
    # Para cerrar ventanas. Una curva inversa que empieza lenta y acelera muchísimo al final.
    # Como soltar una goma tensa.
    bezier = snap, 0.1, 1, 0, 1

    # --- VENTANAS (Bungee Jumping) ---

    # ENTRADA: 'slidevert' + 'rubber'.
    # La ventana entra desde abajo/arriba y rebota al llegar a su posición.
    # Velocidad 5: Perfecta para ver el efecto.
    animation = windowsIn, 1, 5, rubber, slidevert

    # SALIDA: 'slidevert' + 'snap'.
    # La ventana sale disparada hacia el borde vertical.
    # Velocidad 4: Rápida y seca.
    animation = windowsOut, 1, 4, snap, slidevert

    # MOVIMIENTO: Aquí suavizamos un poco (overshot menor) para no marear.
    animation = windowsMove, 1, 5, rubber, slide

    # --- FADES (Rápidos) ---
    # La elasticidad implica energía cinética, no lentitud.
    animation = fade, 1, 4, default

    # Capas: Los menús también rebotan verticalmente.
    animation = layers, 1, 4, rubber, slidevert

    # --- ESPACIOS DE TRABAJO (Trampolín) ---
    # Desplazamiento vertical con mucho rebote.
    animation = workspaces, 1, 6, rubber, slidevert
}
