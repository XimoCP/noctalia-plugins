# @Title: Impacto Clásico
# @Icon: flame
# @Color: #fb7185
# @Tag: FX
# @Desc: Efecto "Jelly". Rebote elástico al entrar y anticipación al salir.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

animations {
    enabled = true

    # --- BEZIERS DE CARÁCTER ---

    # 1. ELASTIC (Entrada): Sube rápido y rebota al final (Overshoot).
    bezier = elastic, 0.05, 0.9, 0.1, 1.05

    # 2. RETRO (Salida): Toma impulso hacia atrás (BackIn) y acelera.
    # Esto hace que la ventana parezca que se "encoge" antes de desaparecer.
    bezier = retro, 0.6, -0.28, 0.735, 0.045

    # 3. SMOOTH (Movimiento): Para arrastrar ventanas sin que parezca gelatina.
    bezier = smooth, 0.1, 1, 0.1, 1

    # --- VENTANAS ---

    # ENTRADA: Velocidad 6. El 'popin 80%' combinado con 'elastic' crea el efecto rebote.
    animation = windowsIn, 1, 6, elastic, popin 80%

    # SALIDA: Velocidad 5 (Un poco más rápida).
    # La curva 'retro' hace que se chupe hacia adentro antes de irse.
    animation = windowsOut, 1, 5, retro, popin 80%

    # MOVIMIENTO: Usamos 'slide' y una curva suave.
    # Si usáramos 'elastic' aquí, la ventana vibraría al soltarla, lo cual marea.
    animation = windowsMove, 1, 5, smooth, slide

    # --- RESTO DEL SISTEMA ---

    # Fades estándar
    animation = fade, 1, 5, smooth

    # Workspaces: Les damos el mismo rebote 'elastic' para que todo el sistema
    # se sienta juguetón y coherente.
    animation = workspaces, 1, 6, elastic, slide

    # Special: Slide vertical con rebote.
    animation = specialWorkspace, 1, 6, elastic, slidevert
}
