# @Title: Material Moderno
# @Icon: layers-intersect
# @Color: #c084fc
# @Tag: MODERN
# @Desc: Estética Google Pixel. Animaciones orgánicas, escalas sutiles y respuesta táctil.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

animations {
    enabled = true

    # --- BEZIERS (Oficiales de Android) ---
    # Decel: Para cosas que entran (frenan al llegar)
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    # Accel: Para cosas que salen (aceleran al irse)
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    # Standard: Para movimientos dentro de la pantalla
    bezier = md3_standard, 0.2, 0, 0, 1

    # --- VENTANAS (Escala Sutil) ---
    # Entrada: 'popin 80%'. Menos recorrido, más elegancia.
    # Velocidad 4: Un poco más suave que el estándar para apreciar la curva.
    animation = windowsIn, 1, 4, md3_decel, popin 80%

    # Salida: 'popin 80%'. Se encoge ligeramente al desaparecer.
    # Velocidad 3: Rápida, no queremos esperar a que se cierre.
    animation = windowsOut, 1, 3, md3_accel, popin 80%

    # Movimiento: [CRÍTICO] Definido explícitamente como 'slide'.
    # Usamos 'md3_standard' para que se sienta pegado al ratón pero con peso.
    animation = windowsMove, 1, 3, md3_standard, slide

    # --- CAPAS Y MENÚS (Coherencia) ---
    animation = fade, 1, 3, md3_decel

    # Layers: Si entra deslizando, sale deslizando.
    animation = layersIn, 1, 3, md3_decel, slide
    animation = layersOut, 1, 3, md3_accel, slide
    animation = fadeLayersIn, 1, 2, md3_decel
    animation = fadeLayersOut, 1, 2, md3_accel

    # --- ESPACIOS DE TRABAJO (Profundidad) ---
    # Usamos 'slidefade 20%' para simular la navegación por gestos de Android.
    # El escritorio anterior se oscurece ligeramente al irse.
    animation = workspaces, 1, 5, md3_decel, slidefade 20%

    # Special: Slide vertical (como el cajón de aplicaciones).
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}
