# @Title: Enérgico
# @Icon: flame
# @Color: #e11d48
# @Tag: BOLD
# @Desc: Impacto visual máximo. Rebotes exagerados (56%) y salidas con retroceso.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Reasignada la curva de alto impacto
# a la entrada para evitar glitches visuales al cerrar.
# -----------------------------------------------------

animations {
    enabled = true

    # --- BEZIERS DE ALTO OCTANAJE ---

    # "Nitro" (Tu OutBack original):
    # Sube hasta el 1.56. Es el rebote más agresivo de toda la colección.
    # Perfecto para entradas triunfales.
    bezier = nitro, 0.34, 1.56, 0.64, 1

    # "Recoil" (El contragolpe):
    # Baja hasta -0.3. La ventana se contrae visiblemente antes de desaparecer.
    # Es como el retroceso de un arma.
    bezier = recoil, 0.36, 0, 0.66, -0.56

    # "Crazy" (Para movimiento):
    # Un rebote fuerte pero controlado para que arrastrar ventanas se sienta poderoso.
    bezier = crazy, 0.05, 0.9, 0.1, 1.05

    # --- VENTANAS (Explosiones) ---

    # ENTRADA: 'popin 80%' + 'nitro'.
    # La ventana aparece, crece más de la cuenta (ocupa casi toda la pantalla un instante)
    # y se asienta en su sitio. ¡BOOM!
    animation = windowsIn, 1, 6, nitro, popin 80%

    # SALIDA: 'popin 80%' + 'recoil'.
    # La ventana se encoge bruscamente y desaparece.
    animation = windowsOut, 1, 5, recoil, popin 80%

    # MOVIMIENTO: Pesado y potente.
    animation = windowsMove, 1, 5, crazy, slide

    # --- FADES ---
    # Rápidos, no queremos distraer de la acción principal.
    animation = fade, 1, 3, default
    animation = layers, 1, 4, nitro, popin

    # --- ESPACIOS DE TRABAJO (Terremoto) ---
    # Usamos 'nitro' también aquí.
    # Cambiar de escritorio sacude la pantalla con fuerza.
    animation = workspaces, 1, 5, nitro, slide
}
