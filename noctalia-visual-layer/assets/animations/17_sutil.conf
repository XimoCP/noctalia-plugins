# @Title: Sutil
# @Icon: sparkles
# @Color: #94a3b8
# @Tag: PRO
# @Desc: Cero distracciones. Suavidad absoluta sin rebotes ni movimientos bruscos.


# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Eliminada toda la física de rebote.
# Ajustado para máxima concentración y fatiga visual cero.
# -----------------------------------------------------

animations {
    enabled = true

    # --- BEZIERS DE OFICINA ---

    # "Soft": Una curva Quartic suave.
    # Empieza con decisión y frena con una elegancia absoluta.
    bezier = soft, 0.25, 1, 0.5, 1

    # "Focus": Lineal-Suavizada.
    # Para movimientos que necesitan ser rápidos pero no secos.
    bezier = focus, 0.16, 1, 0.3, 1

    # --- VENTANAS (Focus Mode) ---

    # ENTRADA: 'popin 95%' + 'soft'.
    # La ventana aparece casi en su sitio. No viaja por la pantalla.
    # Velocidad 5: Lo suficientemente rápido para no esperar, lo suficientemente lento para no asustar.
    animation = windowsIn, 1, 5, soft, popin 95%

    # SALIDA: 'popin 98%' + 'focus'.
    # Casi un desvanecimiento puro, con un micro-escalado.
    # Velocidad 4: Desaparición rápida.
    animation = windowsOut, 1, 4, focus, popin 98%

    # MOVIMIENTO: Sólido.
    # La ventana se siente pesada y estable, no flota.
    animation = windowsMove, 1, 5, soft, slide

    # --- CAPAS Y FADES ---
    # Velocidad 4: Transiciones rápidas.
    animation = fade, 1, 4, soft

    # Capas: Entran deslizando muy poco.
    animation = layers, 1, 4, soft, popin

    # --- ESPACIOS DE TRABAJO (Flujo) ---
    # 'slidefade 5%'.
    # Fíjate en el 5%. Es un movimiento minúsculo.
    # El escritorio cambia casi sin moverse, solo se desliza unos píxeles.
    # Es la definición de "Sutil".
    animation = workspaces, 1, 5, soft, slidefade 5%
}
