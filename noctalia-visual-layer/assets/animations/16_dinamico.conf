# @Title: Dinámico
# @Icon: adjustments
# @Color: #f97316
# @Tag: LIVE
# @Desc: Ritmo orgánico. Combinación de velocidad y asentamiento suave.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Diferenciado de "Inercia".
# Enfoque en el ritmo variable y la "respiración" de las ventanas.
# -----------------------------------------------------

animations {
    enabled = true

    # --- BEZIERS DE RITMO ---

    # "Pulse" (Pulso):
    # Sube rápido (0.1), frena (0.9), y tiene un micro-rebote final (1.05).
    # Es menos exagerado que el "Arcade" pero más vivo que el "Material".
    bezier = pulse, 0.1, 0.9, 0.1, 1.05

    # "Quick" (Rápido):
    # Una curva agresiva para salidas. Sin anticipación, solo velocidad.
    bezier = quick, 0.2, 1, 0.2, 1

    # --- VENTANAS (Bio-Mecánica) ---

    # ENTRADA: 'slide' + 'pulse'.
    # La ventana entra rápido y se acomoda con un pequeño "suspiro" visual.
    # Velocidad 6: Da tiempo a sentir el ritmo.
    animation = windowsIn, 1, 6, pulse, slide

    # SALIDA: 'slide' + 'quick'.
    # A diferencia de la entrada suave, la salida es decidida.
    # Esto crea el contraste "Dinámico": Entrar suave / Salir rápido.
    animation = windowsOut, 1, 4, quick, slide

    # MOVIMIENTO: Fluido.
    animation = windowsMove, 1, 5, pulse, slide

    # --- FADES (Sincronizados) ---
    # Velocidad 5: Ni muy lento ni muy rápido. Sincronizado con el movimiento.
    animation = fade, 1, 5, pulse

    # Capas: Entran con el mismo "pulso" que las ventanas.
    animation = layers, 1, 5, pulse, popin

    # --- ESPACIOS DE TRABAJO (Escena) ---
    # AQUÍ ESTÁ EL TRUCO: 'slidefade 40%'.
    # Al moverte, el escritorio viejo se vuelve casi transparente.
    # Da una sensación de mucha profundidad y dinamismo, como pasar páginas de aire.
    animation = workspaces, 1, 6, pulse, slidefade 40%
}
