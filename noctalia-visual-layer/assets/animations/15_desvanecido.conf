# @Title: Desvanecido
# @Icon: cloud
# @Color: #cbd5e1
# @Tag: GHOST
# @Desc: Materialización espectral. Las ventanas aparecen suavemente sin moverse apenas.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Eliminados los rebotes físicos.
# Enfoque total en opacidad y escalado sutil (The Ghost Effect).
# -----------------------------------------------------

animations {
    enabled = yes

    # --- BEZIERS ESPECTRALES ---

    # "Phantom": Una curva Sine pura.
    # No hay acelerones ni frenazos bruscos. Es como respirar.
    bezier = phantom, 0.4, 0, 0.6, 1

    # "Mist" (Niebla):
    # Para el movimiento. Un poco más de fricción para que no resbale.
    bezier = mist, 0.2, 0.8, 0.2, 1

    # --- VENTANAS (Apariciones) ---

    # ENTRADA: 'popin 90%' + 'phantom'.
    # La ventana aparece casi en su tamaño final, solo crece un 10% mientras se hace opaca.
    # Velocidad 7: Lento. Queremos ver la transición.
    animation = windowsIn, 1, 7, phantom, popin 90%

    # SALIDA: 'popin 95%' + 'phantom'.
    # Apenas se mueve al cerrarse. Simplemente deja de estar ahí.
    animation = windowsOut, 1, 6, phantom, popin 95%

    # MOVIMIENTO: Suave y silencioso.
    animation = windowsMove, 1, 6, mist, slide

    # --- FADES (El Núcleo) ---
    # Velocidad 8: Las transparencias son muy notables.
    animation = fade, 1, 8, phantom

    # Capas: Los menús aparecen flotando.
    animation = layers, 1, 6, phantom, popin

    # --- ESPACIOS DE TRABAJO (Teletransportación) ---
    # Olvida el 'slidevert'. Un fantasma atraviesa paredes.
    # Usamos 'fade' puro o 'slidefade' con muy poco movimiento.
    # Esto hace que el escritorio viejo se disuelva en el nuevo.
    animation = workspaces, 1, 8, phantom, fade
}
