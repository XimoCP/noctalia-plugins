# @Title: Seda (Silk)
# @Icon: feather
# @Color: #4ade80
# @Tag: HYBRID
# @Desc: El estilo JaKooLit refinado. Entradas con energía, salidas fugaces y workspaces estables.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Se ha suavizado el rebote en los
# workspaces para evitar mareos (Motion Sickness).
# -----------------------------------------------------

animations {
    enabled = yes

    # --- BEZIERS (La Firma de JaKooLit) ---

    # "Overshot": El rebote estándar perfecto.
    # Sube rápido, se pasa un 5% y vuelve. Se siente orgánico.
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    # "SmoothOut": Una curva suave para salidas rápidas.
    # Empieza suave, acelera y termina suave. Sin tirones.
    bezier = smoothOut, 0.3, 0, 0.3, 1

    # "Crazy": (Opcional) Si quieres mantener esa entrada agresiva del original.
    # Lo usaremos solo para la entrada de ventanas, NO para workspaces.
    bezier = crazy, 0.1, 1.1, 0.1, 1.1

    # --- VENTANAS (Energía Controlada) ---

    # ENTRADA: Usamos 'overshot' (o 'crazy' si quieres más rebote).
    # 'popin 80%' + 'slide' crea ese efecto de que la ventana se lanza hacia ti.
    # Velocidad 6: Se nota la fluidez.
    animation = windowsIn, 1, 6, overshot, slide

    # SALIDA: Rápida (Velocidad 4).
    # La ventana se va sin molestar usando la curva suave.
    animation = windowsOut, 1, 4, smoothOut, slide

    # MOVIMIENTO: Fluido y conectado al ratón.
    animation = windowsMove, 1, 5, overshot, slide

    # --- CAPAS Y FADES ---
    animation = fade, 1, 5, smoothOut
    animation = layers, 1, 5, overshot, slide

    # --- ESPACIOS DE TRABAJO (Aquí está la mejora) ---
    # En lugar de usar curvas locas, usamos 'overshot' estándar.
    # El cambio de escritorio tiene un pequeño "asentamiento" al final,
    # pero ya no parece que la pantalla sea de gelatina.
    animation = workspaces, 1, 6, overshot, slide
}
