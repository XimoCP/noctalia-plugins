# @Title: Rebote
# @Icon: trending-up
# @Color: #fbbf24
# @Tag: BOUNCY
# @Desc: Física de muelle vertical. Las ventanas caen y rebotan al abrirse.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Convertido de "Ascensor Rápido"
# a "Muelle Físico Real".
# -----------------------------------------------------

animations {
    enabled = true

    # --- BEZIERS DE FÍSICA ---

    # "Spring" (El Muelle):
    # Sube rápido, se pasa hasta el 1.1 (10% extra) y vuelve a su sitio.
    bezier = spring, 0.05, 0.9, 0.1, 1.1

    # "Crouch" (Agacharse):
    # Antes de saltar (cerrarse), se encoge un poco hacia abajo (-0.1).
    bezier = crouch, 0.1, -0.1, 0.1, 1.0

    # --- VENTANAS (Efecto Gravedad) ---

    # ENTRADA: 'popin 80%' + 'spring'.
    # La ventana cae desde arriba (o crece) y BOING, rebota al llegar.
    # Velocidad 5: Necesitamos tiempo para ver el rebote.
    animation = windowsIn, 1, 5, spring, popin 80%

    # SALIDA: 'popin 80%' + 'crouch'.
    # La ventana hace el gesto de coger impulso hacia abajo y desaparece.
    animation = windowsOut, 1, 5, crouch, popin 80%

    # MOVIMIENTO: Fluido pero con un toque elástico.
    animation = windowsMove, 1, 5, spring, slide

    # --- FADES ---
    animation = fade, 1, 3, default
    animation = fadeLayersIn, 1, 3, default
    animation = layers, 1, 4, spring, popin

    # --- ESPACIOS DE TRABAJO (El Pogo Stick) ---
    # Mantenemos tu idea original de verticalidad ('slidevert').
    # Al cambiar de escritorio, la pantalla entera sube/baja y rebota al frenar.
    # Es un efecto muy divertido.
    animation = workspaces, 1, 5, spring, slidevert

    # Gestos (Comentados por seguridad, mejor en hyprland.conf)
    # gesture = 3, horizontal, unset
    # gesture = 3, vertical, workspace
}
