# @Title: Inercia ElГЎstica
# @Icon: adjustments
# @Color: #60a5fa
# @Tag: PHYSICS
# @Desc: Movimiento orgГЎnico. Las ventanas toman impulso al salir y rebotan al entrar.

# -----------------------------------------------------
# в–„в–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–ҲвҖғв–Ҳв–Җв–„в–Җв–ҲвҖғв–„в–Җв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–Ҳ
# в–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–Ҳ
#

animations {
    enabled = true

    # --- BEZIERS DE FГҚSICA ---

    # 1. ANTICIPACIГ“N (Para cerrar):
    # La curva baja a -0.1 (toma impulso atrГЎs) y luego dispara a 1.
    bezier = anticipate, 0.1, -0.1, 0.1, 1.0

    # 2. INERCIA (Para abrir):
    # Llega rГЎpido y se pasa un poco (1.05) para asentarse suavemente.
    bezier = inertia, 0.05, 0.9, 0.1, 1.05

    # 3. FRICCIГ“N (Para mover):
    # Empieza rГЎpido, termina muy suave.
    bezier = friction, 0.05, 0.9, 0.1, 1.0

    # --- ANIMACIONES ---

    # ENTRADA: Inercia pura.
    # Usamos 'slide' para que entre desde abajo/lado como una carta fГӯsica.
    animation = windowsIn, 1, 5, inertia, slide

    # SALIDA: AnticipaciГіn.
    # FГӯjate en el efecto: la ventana retrocede un milГӯmetro antes de irse volando.
    # Bajamos la velocidad a 6 para que dГ© tiempo a ver ese "impulso".
    animation = windowsOut, 1, 6, anticipate, slide

    # MOVIMIENTO: FricciГіn.
    # Sin rebotes raros, solo suavidad al arrastrar.
    animation = windowsMove, 1, 5, friction, slide

    # CAPAS Y FADES: Sincronizados.
    # Bajamos de 10 a 5. Ahora la opacidad va a la par que el movimiento.
    animation = fade, 1, 5, friction
    animation = layers, 1, 5, friction, fade

    # WORKSPACES:
    # 'slidefade 20%' da una sensaciГіn de profundidad 3D muy moderna.
    animation = workspaces, 1, 6, inertia, slidefade 20%
}
