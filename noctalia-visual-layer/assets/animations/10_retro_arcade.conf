# @Title: Retro Arcade
# @Icon: device-gamepad-2
# @Color: #f472b6
# @Tag: 80s
# @Desc: Efecto "Toon/Arcade". Las ventanas saltan y rebotan exageradamente.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Hemos movido la curva "loca"
# del movimiento (donde molestaba) a la entrada (donde divierte).
# -----------------------------------------------------

animations {
    enabled = true

    # --- BEZIERS ARCADE ---

    # "JUMP" (Tu antigua smoothIn): La joya de la corona.
    # Retrocede mucho y rebota mucho. Perfecto para ventanas que "saltan".
    bezier = jump, 0.5, -0.3, 0.68, 1.4

    # "SQUASH" (Para cerrar):
    # Anticipación para coger impulso y desaparecer.
    bezier = squash, 0.5, -0.5, 0.1, 1.0

    # "RUBBER" (Para mover):
    # Un rebote más controlado para que arrastrar no sea un suplicio.
    bezier = rubber, 0.05, 0.9, 0.1, 1.05

    # --- VENTANAS (El Show) ---

    # ENTRADA: 'popin 80%' + 'jump'.
    # La ventana aparece pequeña, se encoge un milisegundo y ¡BOING! explota en pantalla.
    # Velocidad 5 para que se aprecie la caricatura.
    animation = windowsIn, 1, 5, jump, popin 80%

    # SALIDA: 'popin 80%' + 'squash'.
    # La ventana se encoge drásticamente (como si la aspiraran) antes de irse.
    animation = windowsOut, 1, 4, squash, popin 80%

    # MOVIMIENTO: Usamos 'rubber' (overshot estándar).
    # Queremos que sea divertido pero controlable.
    animation = windowsMove, 1, 4, rubber, slide

    # --- RESTO DEL SISTEMA ---

    # Fades: Rápidos y simples para no distraer del show principal.
    animation = fade, 1, 3, default

    # Workspaces: ¡BOING!
    # Cambiar de escritorio hace que toda la pantalla rebote.
    # Es un efecto muy fuerte, pero encaja perfecto con el tema "Retro".
    animation = workspaces, 1, 5, jump, slide
}
