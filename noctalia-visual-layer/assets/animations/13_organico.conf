# -----------------------------------------------------
# @Title: Orgánico
# @Icon: leaf
# @Color: #a3e635
# @Tag: NATURE
# @Desc: Movimiento de "brote". Crecimiento vertical suave y desvanecimientos lentos.
# -----------------------------------------------------

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# >>> Optimizado por NVL: Limpieza de redundancias y física de planta. <<<

animations {
    enabled = yes

    # --- BEZIERS NATURALES ---

    # "Sprout" (Brote):
    # Empieza lento, sube y se asienta con una suavidad extrema.
    # No tiene rebote agresivo, es como una hoja mecida por el viento.
    bezier = sprout, 0.25, 0.8, 0.25, 1.0

    # "Wind" (Viento):
    # Un ligero overshot (1.05) para cuando movemos ventanas,
    # para que no parezcan piedras, sino algo ligero.
    bezier = wind, 0.05, 0.9, 0.1, 1.05

    # --- VENTANAS (Fotosíntesis) ---

    # ENTRADA: 'popin 85%'.
    # La ventana "brota" casi a tamaño completo.
    # Velocidad 6: Lento y relajante.
    animation = windowsIn, 1, 6, sprout, popin 85%

    # SALIDA: 'popin 95%'.
    # Apenas se encoge. Simplemente se evapora como el rocío.
    animation = windowsOut, 1, 5, sprout, popin 95%

    # MOVIMIENTO: Usamos 'wind' para que se sienta ligero al arrastrar.
    animation = windowsMove, 1, 5, wind, slide

    # --- FADES (Niebla) ---
    # Velocidad 7: Transparencias muy lentas y oníricas.
    animation = fade, 1, 7, sprout

    # Capas: Entran suavemente creciendo.
    animation = layers, 1, 5, sprout, popin

    # --- ESPACIOS DE TRABAJO (Enredadera) ---
    # Mantenemos tu 'slidevert'.
    # Moverse entre escritorios se siente como trepar por una enredadera.
    animation = workspaces, 1, 6, sprout, slidevert
}
