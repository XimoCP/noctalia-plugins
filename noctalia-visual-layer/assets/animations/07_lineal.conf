# @Title: Lineal
# @Icon: chart-line
# @Color: #2dd4bf
# @Tag: FLAT
# @Desc: Precisión matemática. Movimiento constante estilo "Sci-Fi HUD".


# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Velocidad aumentada para evitar sensación de lag.
# -----------------------------------------------------

animations {
    enabled = true

    # --- BEZIER LINEAL ESTÁNDAR ---
    # Definición matemática correcta de una recta de 0 a 1.
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # --- VENTANAS (Estilo Máquina) ---
    # Velocidad 5: Lo suficientemente rápido para que el "golpe" final no moleste.
    # Usamos 'slide' puro. Sin escalas ni transparencias raras.
    animation = windowsIn, 1, 5, linear, slide
    animation = windowsOut, 1, 5, linear, slide

    # Movimiento: Aquí la linealidad se siente muy "raw" (cruda).
    # La ventana sigue al ratón exactamente, sin peso.
    animation = windowsMove, 1, 5, linear, slide

    # --- FADES Y CAPAS ---
    # Los desvanecimientos lineales deben ser rápidos.
    animation = fade, 1, 4, linear
    animation = layers, 1, 4, linear, fade

    # --- ESPACIOS DE TRABAJO ---
    # Slide simple. Es como pasar diapositivas de un proyector antiguo.
    # Seco, rápido y funcional.
    animation = workspaces, 1, 5, linear, slide
}
