# @Title: Cristal
# @Icon: droplet
# @Color: #38bdf8
# @Tag: VIBE
# @Desc: Deslizamiento etéreo. Sensación de vidrio flotando sin fricción.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimizado por NVL: Eliminados los rebotes elásticos.
# Enfoque en suavidad "Glass" y transparencias.
# -----------------------------------------------------

animations {
    enabled = yes

    # --- BEZIERS (CRISTALINOS) ---

    # "Glass": Una curva exponencial suave.
    # Empieza rápido y frena con una suavidad extrema al final (sin rebote).
    bezier = glass, 0.16, 1, 0.3, 1

    # "Fade": Lineal pero suavizado para las opacidades.
    bezier = fade, 0.33, 1, 0.68, 1

    # --- VENTANAS ---

    # ENTRADA: Usamos 'slide' pero con la curva 'glass'.
    # La ventana entra deslizando como si estuviera sobre hielo/vidrio.
    # Velocidad 6: Lenta y elegante.
    animation = windowsIn, 1, 6, glass, slide

    # SALIDA: Aquí aplicamos el "toque etéreo".
    # Usamos 'popin 90%'. La ventana se aleja un poquito mientras desaparece.
    animation = windowsOut, 1, 6, glass, popin 90%

    # MOVIMIENTO: Absolutamente fluido.
    animation = windowsMove, 1, 6, glass, slide

    # --- FADES (Protagonistas) ---
    # Para un efecto "Cristal", los fades deben ser notables.
    # Velocidad 7: Las cosas tardan un poco en volverse sólidas.
    animation = fade, 1, 7, fade
    animation = layers, 1, 6, glass, fade

    # --- ESPACIOS DE TRABAJO ---
    # 'slidefade 10%' es clave aquí.
    # El movimiento es sutil y transparente, no agresivo.
    animation = workspaces, 1, 6, glass, slidefade 10%
}
