# -----------------------------------------------------
# PRESET: 02_DIAGONAL_FADE (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # Fusionamos el color Primario con el color de Superficie
    # Esto crea el efecto de desvanecimiento hacia el fondo de la ventana
    col.active_border = $primary $surface 45deg

    # Inactivo sutil para no distraer
    col.inactive_border = $surface_lowest
}

# Mantenemos la animación en 0 para un degradado estático y limpio
animation = borderangle, 0
