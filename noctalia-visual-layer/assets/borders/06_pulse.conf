# -----------------------------------------------------
# PRESET: 06_HEARTBEAT (EKG STYLE)
# -----------------------------------------------------
general {
    # Mantenemos el truco visual: Mucho espacio vacío y poco color.
    # Esto crea la "bola de energía" que gira.
    col.active_border = $primary $surface $surface $surface 45deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # --- LA CURVA MÁGICA ---
    # bezier = nombre, x1, y1, x2, y2
    #
    # 0.05, 0.9 -> En el 5% del tiempo, ya ha completado el 90% del giro.
    # 0.1, 1.0  -> En el 10% del tiempo, ha terminado el giro (100%).
    # Resto del tiempo -> Se queda plano en 1.0 (quieto) hasta que reinicia el loop.
    bezier = heartbeat, 0.05, 0.9, 0.1, 1.0

    # Animación:
    # Velocidad 40: Ponemos un tiempo largo (aprox 4 seg totales).
    # Gracias a la curva, el giro dura 0.4s y la pausa dura 3.6s.
    # loop: Se repite infinitamente.
    animation = borderangle, 1, 40, heartbeat, loop

    # El color entra de golpe y se queda
    animation = border, 1, 10, default
}
