# -----------------------------------------------------
# PRESET: 04_TRI_PRIME (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # La tríada de Noctalia: Morado ($primary), Naranja ($secondary) y Aguamarina ($tertiary)
    # A 45 grados, los tres colores se reparten la atención de la ventana.
    col.active_border = $primary $secondary $tertiary 90deg

    # Inactivo oscuro para resaltar la ventana de trabajo
    col.inactive_border = $surface_lowest
}

# Sin movimiento para mantener la elegancia de los tres tonos fijos
animation = borderangle, 0
