# -----------------------------------------------------
# PRESET: 09_CYBER_GLITCH (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # El truco del Glitch: Ponemos el color de fondo ($surface) entre los colores brillantes.
    # Al rotar rápido, parecerá que el borde tiene "píxeles muertos" o parpadeos.
    col.active_border = $error $surface $primary $surface 90deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # Curva 'rapid': Salta casi instantáneamente, eliminando cualquier suavidad.
    bezier = rapid, 0, 1, 0, 1

    # Velocidad: 15 (Frenético).
    # En tu RTX 5070ti esto se verá nítido y eléctrico, sin estelas borrosas.
    animation = borderangle, 1, 15, rapid, loop
}
