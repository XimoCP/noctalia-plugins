# -----------------------------------------------------
# PRESET: 05_FULL_SPECTRUM (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # La "Cuadrilla Noctalia": Morado, Naranja, Aguamarina y Rosa/Rojo.
    # Esta combinación cubre todo el espectro visual de tu marca.
    col.active_border = $primary $secondary $tertiary $error 45deg

    # Fondo ultra oscuro para que el espectro brille más
    col.inactive_border = $surface_lowest
}

# Mantenemos el ángulo estático para apreciar la paleta completa
animation = borderangle, 0
