# -----------------------------------------------------
# PRESET: 07_INFINITY_LOOP (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # Usamos la paleta completa: Primario -> Secundario -> Terciario -> Error -> Primario
    # Repetir $primary al final garantiza que el degradado sea circular y sin cortes.
    col.active_border = $primary $secondary $tertiary $error $primary $secondary $tertiary $error 45deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # La curva 'linear' es obligatoria para que el movimiento no tenga tirones.
    # Nota: Ya la inyectamos en assemble.sh, pero definirla aquí asegura que funcione.
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # Velocidad: 50 (Equilibrado). Ni muy rápido que distraiga, ni muy lento que no se vea.
    # El modo 'loop' lo mantiene activo mientras la ventana tenga el foco.
    animation = borderangle, 1, 50, linear, loop
}
