# -----------------------------------------------------
# PRESET: 10_GOLDEN_LUXURY (HARDCODED GOLD)
# -----------------------------------------------------

general {
    # PALETA DE ORO REAL:
    # 0xffC5A000 = Oro Oscuro (Base)
    # 0xffFFD700 = Oro Puro (Brillo medio)
    # 0xffFFFFFF = Blanco (Reflejo Especular)

    # La secuencia crea un degradado metálico muy rico:
    col.active_border = 0xffC5A000 0xffFFD700 0xffFFFFFF 0xffFFD700 0xffC5A000 45deg

    # Inactivo: Un gris oscuro muy sutil para que el oro destaque más al activarse
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # "Shimmer": Curva suave para que el brillo se mueva con elegancia.
    bezier = shimmer, 0.45, 0, 0.55, 1

    # Velocidad 60: Movimiento lento y pesado, como metal precioso.
    animation = borderangle, 1, 60, shimmer, loop
}
