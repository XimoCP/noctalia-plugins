# -----------------------------------------------------
# PRESET: 03_DUO_CONTRAST (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # Combinamos el Morado ($primary) con el Melocotón ($secondary)
    # El ángulo de 45 grados crea una división diagonal perfecta
    col.active_border = $primary $secondary 90deg

    # Inactivo sutil
    col.inactive_border = $surface_lowest
}

# Sin rotación para mantener la jerarquía de colores fija
animation = borderangle, 0
