# -----------------------------------------------------
# PRESET: 01_CASCADE (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # 180deg = Vertical (Arriba a Abajo)
    # Repetimos $primary para forzar el color sólido hasta abajo
    col.active_border = $primary $surface 90deg
    col.inactive_border = $surface_lowest
}
# La animación de ángulo DEBE estar desactivada para que la cascada
# no empiece a dar vueltas como una lavadora.
animation = borderangle, 0
